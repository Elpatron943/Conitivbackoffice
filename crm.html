<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM | Conitiv</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="calculator.css">
  <link rel="stylesheet" href="crm.css">
</head>
<body>
  <header class="header">
    <div class="container container--wide">
      <a href="index.html" class="logo">Conitiv</a>
      <nav class="nav">
        <a href="index.html">Accueil</a>
        <a href="calculator.html">Calculateur</a>
        <a href="crm.html" class="nav-active">CRM</a>
        <a href="processus-vente.html">Processus vente</a>
      </nav>
    </div>
  </header>

  <main class="crm-main">
    <section class="section">
      <div class="container container--wide">
        <div class="crm-header">
          <h1 class="crm-title">CRM</h1>
          <a href="calculator.html" class="btn btn-primary">Nouvelle analyse</a>
        </div>

        <div class="tabs">
          <button type="button" class="tab-btn tab-btn--active" data-tab="entreprises">🏢 Entreprises</button>
          <button type="button" class="tab-btn" data-tab="contacts">👤 Contacts</button>
          <button type="button" class="tab-btn" data-tab="actions">📋 Actions</button>
          <button type="button" class="tab-btn" data-tab="affaires">💰 Affaires</button>
          <button type="button" class="tab-btn" data-tab="campaigns">📢 Types de campagnes</button>
        </div>

        <!-- Onglet Entreprises -->
        <div class="tab-panel tab-panel--active" id="panel-entreprises">
          <div class="crm-toolbar">
            <button type="button" class="btn btn-primary" id="btnAddEntreprise">+ Ajouter une entreprise</button>
            <input type="search" id="searchEntreprise" class="crm-search" placeholder="Rechercher…">
            <select id="filterEntrepriseSecteur">
              <option value="">Tous les secteurs</option>
              <option value="industrie">Industrie</option>
              <option value="finance">Finance</option>
              <option value="retail">Retail</option>
              <option value="sante">Santé</option>
              <option value="telecom">Télécom</option>
              <option value="services">Services</option>
            </select>
            <select id="filterEntrepriseTaille">
              <option value="">Toutes les tailles</option>
              <option value="pme">PME</option>
              <option value="eti">ETI</option>
              <option value="grand">Grande entreprise</option>
            </select>
          </div>
          <div class="crm-list" id="listEntreprises"></div>
        </div>

        <!-- Onglet Contacts -->
        <div class="tab-panel" id="panel-contacts">
          <div class="crm-toolbar">
            <button type="button" class="btn btn-primary" id="btnAddContact">+ Ajouter un contact</button>
            <input type="search" id="searchContact" class="crm-search" placeholder="Rechercher…">
            <select id="filterContactEntreprise">
              <option value="">Toutes les entreprises</option>
            </select>
          </div>
          <div class="crm-list" id="listContacts"></div>
        </div>

        <!-- Onglet Actions -->
        <div class="tab-panel" id="panel-actions">
          <div class="crm-toolbar">
            <button type="button" class="btn btn-primary" id="btnAddAction">+ Ajouter une action</button>
            <select id="btnAddCampaign" class="btn btn-secondary">
              <option value="">+ Nouvelle campagne…</option>
            </select>
            <input type="search" id="searchAction" class="crm-search" placeholder="Rechercher…">
            <select id="filterActionType">
              <option value="">Tous les types</option>
            </select>
            <select id="filterActionStatut">
              <option value="">Tous les statuts</option>
            </select>
          </div>
          <div class="crm-list" id="listActions"></div>
        </div>

        <!-- Onglet Affaires -->
        <div class="tab-panel" id="panel-affaires">
          <div class="crm-toolbar">
            <button type="button" class="btn btn-primary" id="btnAddAffaire">+ Ajouter une affaire</button>
            <input type="search" id="searchAffaire" class="crm-search" placeholder="Rechercher…">
            <select id="filterAffaireStage">
              <option value="">Toutes les étapes</option>
            </select>
          </div>
          <div class="crm-list" id="listAffaires"></div>
        </div>

        <!-- Onglet Types de campagnes -->
        <div class="tab-panel" id="panel-campaigns">
          <div class="crm-toolbar">
            <button type="button" class="btn btn-primary" id="btnAddCampaignType">+ Créer un type de campagne</button>
          </div>
          <div class="crm-list" id="listCampaignTypes"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- Modal Type de campagne -->
  <div class="crm-modal" id="modalCampaignType" style="display:none">
    <div class="crm-modal-content">
      <h2 id="modalCampaignTypeTitle">Nouveau type de campagne</h2>
      <form id="formCampaignType">
        <input type="hidden" id="ctId">
        <div class="form-group"><label>Nom *</label><input type="text" id="ctNom" required placeholder="Ex. : Campagne cyber"></div>
        <div class="form-group">
          <label>Étapes du workflow</label>
          <div id="ctStepsList" class="ct-steps-list"></div>
          <button type="button" class="btn btn-secondary btn--small" id="btnAddStep">+ Ajouter une étape</button>
        </div>
        <div class="crm-modal-actions">
          <button type="submit" class="btn btn-primary">Enregistrer</button>
          <button type="button" class="btn btn-secondary" data-close="modalCampaignType">Annuler</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal Entreprise -->
  <div class="crm-modal" id="modalEntreprise" style="display:none">
    <div class="crm-modal-content">
      <h2 id="modalEntrepriseTitle">Nouvelle entreprise</h2>
      <form id="formEntreprise">
        <input type="hidden" id="entId">
        <div class="form-row">
          <div class="form-group"><label>Nom *</label><input type="text" id="entNom" required></div>
          <div class="form-group"><label>Secteur</label>
            <select id="entSecteur">
              <option value="">—</option>
              <option value="industrie">Industrie</option>
              <option value="finance">Finance</option>
              <option value="retail">Retail</option>
              <option value="sante">Santé</option>
              <option value="telecom">Télécom</option>
              <option value="services">Services</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Taille</label>
            <select id="entTaille">
              <option value="">—</option>
              <option value="pme">PME</option>
              <option value="eti">ETI</option>
              <option value="grand">Grande entreprise</option>
            </select>
          </div>
          <div class="form-group"><label>SIRET</label><input type="text" id="entSiret" placeholder="14 chiffres"></div>
        </div>
        <div class="form-group"><label>Adresse</label><input type="text" id="entAdresse"></div>
        <div class="form-row">
          <div class="form-group"><label>Ville</label><input type="text" id="entVille"></div>
          <div class="form-group"><label>Code postal</label><input type="text" id="entCodePostal"></div>
          <div class="form-group"><label>Pays</label><input type="text" id="entPays" value="France"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Site web</label><input type="url" id="entSiteWeb" placeholder="https://"></div>
          <div class="form-group"><label>Email</label><input type="email" id="entEmail"></div>
          <div class="form-group"><label>Téléphone</label><input type="tel" id="entTelephone"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>CA annuel</label><input type="text" id="entCa" placeholder="Ex. : 50 M€"></div>
          <div class="form-group"><label>Effectif</label><input type="text" id="entEffectif" placeholder="Ex. : 250"></div>
        </div>
        <div class="form-group"><label>Notes</label><textarea id="entNotes" rows="3"></textarea></div>
        <div class="crm-modal-actions">
          <button type="submit" class="btn btn-primary">Enregistrer</button>
          <button type="button" class="btn btn-secondary" data-close="modalEntreprise">Annuler</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal Contact -->
  <div class="crm-modal" id="modalContact" style="display:none">
    <div class="crm-modal-content">
      <h2 id="modalContactTitle">Nouveau contact</h2>
      <form id="formContact">
        <input type="hidden" id="conId">
        <div class="form-row">
          <div class="form-group"><label>Prénom *</label><input type="text" id="conPrenom" required></div>
          <div class="form-group"><label>Nom *</label><input type="text" id="conNom" required></div>
        </div>
        <div class="form-group"><label>Entreprise</label>
          <div class="crm-combobox">
            <input type="text" id="conEntrepriseSearch" class="crm-combobox-input" placeholder="Rechercher une entreprise…" autocomplete="off">
            <input type="hidden" id="conEntrepriseId">
            <ul class="crm-combobox-list" id="conEntrepriseList"></ul>
          </div>
        </div>
        <div class="form-group"><label>Poste</label><input type="text" id="conPoste" placeholder="Ex. : DSI, Risk Manager"></div>
        <div class="form-row">
          <div class="form-group"><label>Email</label><input type="email" id="conEmail"></div>
          <div class="form-group"><label>Téléphone</label><input type="tel" id="conTelephone"></div>
        </div>
        <div class="form-group">
          <label><input type="checkbox" id="conEstDecideur"> Est décideur</label>
        </div>
        <div class="form-group"><label>Notes</label><textarea id="conNotes" rows="3"></textarea></div>
        <div class="crm-modal-actions">
          <button type="submit" class="btn btn-primary">Enregistrer</button>
          <button type="button" class="btn btn-secondary" data-close="modalContact">Annuler</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal Action -->
  <div class="crm-modal" id="modalAction" style="display:none">
    <div class="crm-modal-content">
      <h2 id="modalActionTitle">Nouvelle action</h2>
      <form id="formAction">
        <input type="hidden" id="actId">
        <div class="form-row">
          <div class="form-group"><label>Type</label>
            <select id="actType"></select>
            <small class="form-hint" id="actTypeHint">Sélectionnez « Campagne cyber » pour le workflow en 7 étapes</small>
          </div>
          <div id="actStatutGroup" class="form-group"><label>Statut</label>
            <select id="actStatut"></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Date</label><input type="date" id="actDate"></div>
          <div class="form-group"><label>Échéance</label><input type="date" id="actEcheance"></div>
        </div>
        <div id="actCampagneCyberFields" class="act-campagne-cyber-fields" style="display:none">
          <div class="form-row">
            <div class="form-group"><label>Étape du workflow</label><select id="actCampagneCyberEtape"></select></div>
            <div class="form-group"><label>Date J0 (lancement)</label><input type="date" id="actDateJ0" title="Date de lancement de la campagne"></div>
          </div>
          <div class="form-group">
            <label class="form-check"><input type="checkbox" id="actEtapeTerminee"> Étape terminée (crée la tâche suivante)</label>
          </div>
        </div>
        <div class="form-group"><label>Sujet *</label><input type="text" id="actSujet" required></div>
        <div class="form-group"><label>Description</label><textarea id="actDescription" rows="3"></textarea></div>
        <div class="form-row">
          <div class="form-group"><label>Entreprise</label>
            <div class="crm-combobox">
              <input type="text" id="actEntrepriseSearch" class="crm-combobox-input" placeholder="Rechercher une entreprise…" autocomplete="off">
              <input type="hidden" id="actEntrepriseId">
              <ul class="crm-combobox-list" id="actEntrepriseList"></ul>
            </div>
          </div>
          <div class="form-group"><label>Contact</label>
            <div class="crm-combobox">
              <input type="text" id="actContactSearch" class="crm-combobox-input" placeholder="Rechercher un contact…" autocomplete="off">
              <input type="hidden" id="actContactId">
              <ul class="crm-combobox-list" id="actContactList"></ul>
            </div>
          </div>
          <div class="form-group"><label>Affaire</label>
            <div class="crm-combobox">
              <input type="text" id="actAffaireSearch" class="crm-combobox-input" placeholder="Rechercher une affaire…" autocomplete="off">
              <input type="hidden" id="actAffaireId">
              <ul class="crm-combobox-list" id="actAffaireList"></ul>
            </div>
          </div>
        </div>
        <div class="crm-modal-actions">
          <button type="submit" class="btn btn-primary">Enregistrer</button>
          <button type="button" class="btn btn-secondary" data-close="modalAction">Annuler</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal Affaire -->
  <div class="crm-modal" id="modalAffaire" style="display:none">
    <div class="crm-modal-content">
      <h2 id="modalAffaireTitle">Nouvelle affaire</h2>
      <form id="formAffaire">
        <input type="hidden" id="affId">
        <div class="form-group"><label>Nom *</label><input type="text" id="affNom" required></div>
        <div class="form-row">
          <div class="form-group"><label>Montant</label><input type="text" id="affMontant" placeholder="Ex. : 50"></div>
          <div class="form-group"><label>Devise</label><select id="affDevise"><option value="€">€</option><option value="k€">k€</option></select></div>
          <div class="form-group"><label>Étape</label><select id="affEtape"></select></div>
          <div class="form-group"><label>Probabilité %</label><input type="number" id="affProbabilite" min="0" max="100" value="0"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Entreprise</label>
            <div class="crm-combobox">
              <input type="text" id="affEntrepriseSearch" class="crm-combobox-input" placeholder="Rechercher une entreprise…" autocomplete="off">
              <input type="hidden" id="affEntrepriseId">
              <ul class="crm-combobox-list" id="affEntrepriseList"></ul>
            </div>
          </div>
          <div class="form-group"><label>Contact principal</label>
            <div class="crm-combobox">
              <input type="text" id="affContactSearch" class="crm-combobox-input" placeholder="Rechercher un contact…" autocomplete="off">
              <input type="hidden" id="affContactId">
              <ul class="crm-combobox-list" id="affContactList"></ul>
            </div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Clôture prévue</label><input type="date" id="affDateCloturePrevue"></div>
          <div class="form-group"><label>Clôture réelle</label><input type="date" id="affDateClotureReelle"></div>
        </div>
        <div class="form-group">
          <label>Produits</label>
          <div class="form-checkboxes">
            <label class="form-check"><input type="checkbox" id="affProduitCyber" value="cyber"> 🛡️ Cyber</label>
            <label class="form-check"><input type="checkbox" id="affProduitEsg" value="esg"> 🌍 ESG</label>
            <label class="form-check"><input type="checkbox" id="affProduitRgpd" value="rgpd"> 📜 RGPD</label>
            <label class="form-check"><input type="checkbox" id="affProduitDefaillance" value="defaillance"> 💰 Défaillance</label>
          </div>
        </div>
        <div class="form-group"><label>Notes</label><textarea id="affNotes" rows="3"></textarea></div>
        <div id="affSnapshot" class="crm-snapshot"></div>
        <div class="crm-modal-actions">
          <button type="submit" class="btn btn-primary">Enregistrer</button>
          <button type="button" class="btn btn-secondary" data-close="modalAffaire">Annuler</button>
        </div>
      </form>
    </div>
  </div>

  <script src="crm.js"></script>
  <script src="crm-ui.js"></script>
</body>
</html>
